name: Release
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to the store (false = upload-only dry run, leaves a draft)"
        type: boolean
        default: false
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Production build (prod env injected)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build
      - run: npm run package
      # Sync the hosted privacy policy gist from docs/privacy-policy.md when actually
      # publishing, so the public policy matches what ships. Needs a PAT with gist scope
      # (GITHUB_TOKEN cannot edit gists). See docs/deploy.md.
      - name: Update hosted privacy policy gist
        if: ${{ inputs.publish }}
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          jq -Rs '{files: {"wave_remote_policy.txt": {content: .}}}' docs/privacy-policy.md \
            | curl -sf -X PATCH \
                -H "Authorization: Bearer $GIST_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                https://api.github.com/gists/1bc682f12a899766c153a921c0df9674 \
                --data-binary @-
      # Run once with publish unchecked for an upload-only dry run (draft in the
      # CWS dashboard), then run again with publish checked. See docs/deploy.md.
      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: wave-remote-*.zip
          glob: true
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: ${{ inputs.publish }}
