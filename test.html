<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Remote - Audio Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8892b0;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .start-btn {
            width: 100%;
            padding: 18px 32px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            color: #1a1a2e;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 217, 255, 0.3);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .start-btn.listening {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
        }

        /* Amplitude Meter */
        .meter-container {
            margin-top: 20px;
        }

        .meter-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #8892b0;
        }

        .meter-bar {
            height: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff88, #00d9ff, #ff6b6b);
            border-radius: 15px;
            transition: width 0.05s ease-out;
        }

        .threshold-line {
            position: absolute;
            left: 78%;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #ff6b6b;
            box-shadow: 0 0 10px #ff6b6b;
        }

        .threshold-label {
            position: absolute;
            left: 78%;
            top: -25px;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #ff6b6b;
        }

        /* Clap Indicator */
        .clap-section {
            text-align: center;
            margin-top: 30px;
        }

        .clap-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(0, 255, 136, 0.1);
            border: 3px solid rgba(0, 255, 136, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            transition: all 0.15s ease;
        }

        .clap-circle.active {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.5);
            transform: scale(1.1);
        }

        .clap-icon {
            font-size: 4rem;
        }

        .clap-count {
            font-size: 3rem;
            font-weight: 700;
            color: #00ff88;
        }

        .clap-label {
            color: #8892b0;
            font-size: 1rem;
        }

        /* Log Section */
        .log-section {
            margin-top: 20px;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .log-title {
            font-size: 1rem;
            color: #8892b0;
        }

        .clear-btn {
            padding: 6px 12px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: #8892b0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .log-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry.clap {
            color: #00ff88;
        }

        .log-entry.command {
            color: #00d9ff;
            font-weight: 600;
        }

        .log-time {
            color: #5a6a8a;
            margin-right: 10px;
        }

        /* Config Panel */
        .config-section {
            margin-top: 20px;
        }

        .config-title {
            font-size: 1rem;
            color: #8892b0;
            margin-bottom: 15px;
        }

        .config-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .config-label {
            font-size: 0.9rem;
            color: #ccd6f6;
        }

        .config-value {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-input {
            width: 80px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            text-align: center;
        }

        .config-unit {
            color: #5a6a8a;
            font-size: 0.85rem;
        }

        /* Status indicator */
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #5a6a8a;
        }

        .status-dot.listening {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status-text {
            font-size: 0.9rem;
            color: #8892b0;
        }
    </style>
</head>

<body>
    <h1>🎤 Wave Remote</h1>
    <p class="subtitle">Audio Detection Test</p>
    <div class="card">
        <button id="startBtn" class="start-btn">🎧 Start Listening</button>
        <div class="status">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText" class="status-text">Click to start</span>
        </div>
        <div class="meter-container">
            <div class="meter-label">
                <span>Amplitude</span>
                <span id="amplitudeValue">0</span>
            </div>
            <div class="meter-bar">
                <div id="meterFill" class="meter-fill"></div>
                <span class="threshold-label">Threshold</span>
                <div class="threshold-line"></div>
            </div>
        </div>
        <div class="clap-section">
            <div id="clapCircle" class="clap-circle">
                <span class="clap-icon">👏</span>
            </div>
            <div id="clapCount" class="clap-count">0</div>
            <div class="clap-label">Claps Detected</div>
        </div>
    </div>
    <div class="card">
        <div class="config-section">
            <div class="config-title">⚙️ Configuration</div>
            <div class="config-row">
                <span class="config-label">Amplitude Threshold</span>
                <div class="config-value">
                    <input type="number" id="threshold" class="config-input" value="50" min="1" max="255">
                    <span class="config-unit">(0-255)</span>
                </div>
            </div>
            <div class="config-row">
                <span class="config-label">High-Pass Filter</span>
                <div class="config-value">
                    <input type="number" id="highpass" class="config-input" value="2000" min="500" max="5000"
                        step="100">
                    <span class="config-unit">Hz</span>
                </div>
            </div>
            <div class="config-row">
                <span class="config-label">Cooldown</span>
                <div class="config-value">
                    <input type="number" id="cooldown" class="config-input" value="120" min="50" max="1000" step="10">
                    <span class="config-unit">ms</span>
                </div>
            </div>
            <div class="config-row">
                <span class="config-label">Multi-Clap Window</span>
                <div class="config-value">
                    <input type="number" id="multiclap" class="config-input" value="600" min="300" max="1500" step="50">
                    <span class="config-unit">ms</span>
                </div>
            </div>
        </div>
    </div>
    <div class="card">
        <div class="log-section">
            <div class="log-header">
                <span class="log-title">📋 Event Log</span>
                <button id="clearLog" class="clear-btn">Clear</button>
            </div>
            <div id="logBox" class="log-box"></div>
        </div>
    </div>
    <script>
        // Configuration
        const CONFIG = {
            HIGH_PASS_FREQUENCY: 2000,
            AMPLITUDE_THRESHOLD: 50,
            COOLDOWN_MS: 120,
            MULTI_CLAP_WINDOW_MS: 600,
            ANALYSIS_INTERVAL_MS: 20,  // Faster for impulse detection
            FFT_SIZE: 256,
            // Impulse detection
            BASELINE_THRESHOLD: 10,
            MAX_IMPULSE_DURATION_MS: 250,
            MIN_SPIKE_SAMPLES: 1
        };
        // State
        let audioContext = null;
        let analyser = null;
        let isListening = false;
        let lastClapTime = 0;
        let clapCount = 0;
        let totalClaps = 0;
        let clapTimer = null;
        let analysisInterval = null;
        // Impulse detection state
        let spikeStartTime = null;
        let spikeSampleCount = 0;
        let lastAmplitude = 0;
        let waitingForDecay = false;
        let waitingForSilence = false;  // After rejecting, wait for silence
        // DOM Elements
        const startBtn = document.getElementById('startBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const meterFill = document.getElementById('meterFill');
        const amplitudeValue = document.getElementById('amplitudeValue');
        const clapCircle = document.getElementById('clapCircle');
        const clapCountEl = document.getElementById('clapCount');
        const logBox = document.getElementById('logBox');
        const clearLogBtn = document.getElementById('clearLog');
        // Config inputs
        const thresholdInput = document.getElementById('threshold');
        const highpassInput = document.getElementById('highpass');
        const cooldownInput = document.getElementById('cooldown');
        const multiclapInput = document.getElementById('multiclap');
        // Update config from inputs
        function updateConfig() {
            CONFIG.AMPLITUDE_THRESHOLD = parseInt(thresholdInput.value);
            CONFIG.HIGH_PASS_FREQUENCY = parseInt(highpassInput.value);
            CONFIG.COOLDOWN_MS = parseInt(cooldownInput.value);
            CONFIG.MULTI_CLAP_WINDOW_MS = parseInt(multiclapInput.value);
            // Update threshold line position
            const thresholdPercent = (CONFIG.AMPLITUDE_THRESHOLD / 255) * 100;
            document.querySelector('.threshold-line').style.left = thresholdPercent + '%';
            document.querySelector('.threshold-label').style.left = thresholdPercent + '%';
        }
        // Attach config listeners
        [thresholdInput, highpassInput, cooldownInput, multiclapInput].forEach(input => {
            input.addEventListener('change', updateConfig);
        });
        // Logging
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="log-time">${time}</span>${message}`;
            logBox.insertBefore(entry, logBox.firstChild);
        }
        clearLogBtn.addEventListener('click', () => {
            logBox.innerHTML = '';
        });
        // Initialize audio
        async function initAudio() {
            try {
                log('Requesting microphone access...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });
                audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(stream);
                // High-pass filter
                const highPassFilter = audioContext.createBiquadFilter();
                highPassFilter.type = 'highpass';
                highPassFilter.frequency.value = CONFIG.HIGH_PASS_FREQUENCY;
                highPassFilter.Q.value = 1;
                // Analyser
                analyser = audioContext.createAnalyser();
                analyser.fftSize = CONFIG.FFT_SIZE;
                analyser.smoothingTimeConstant = 0.3;
                // Connect pipeline
                source.connect(highPassFilter);
                highPassFilter.connect(analyser);
                log('✅ Audio pipeline initialized', 'clap');
                startListening();
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                statusText.textContent = 'Microphone access denied';
            }
        }
        // Start listening
        function startListening() {
            if (isListening) return;
            isListening = true;
            statusDot.classList.add('listening');
            statusText.textContent = 'Listening for claps...';
            startBtn.textContent = '🔴 Stop Listening';
            startBtn.classList.add('listening');
            const bufferLength = analyser.fftSize;
            const dataArray = new Uint8Array(bufferLength);
            analysisInterval = setInterval(() => {
                analyser.getByteTimeDomainData(dataArray);
                // Find peak amplitude
                let maxAmplitude = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const amplitude = Math.abs(dataArray[i] - 128);
                    if (amplitude > maxAmplitude) {
                        maxAmplitude = amplitude;
                    }
                }
                // Scale to 0-255
                const scaledAmplitude = (maxAmplitude / 128) * 255;
                // Update meter
                const percent = (scaledAmplitude / 255) * 100;
                meterFill.style.width = percent + '%';
                amplitudeValue.textContent = Math.round(scaledAmplitude);
                // Detect clap
                detectClap(scaledAmplitude);
            }, CONFIG.ANALYSIS_INTERVAL_MS);
            log('🎤 Started listening');
        }
        // Stop listening
        function stopListening() {
            if (!isListening) return;
            isListening = false;
            statusDot.classList.remove('listening');
            statusText.textContent = 'Stopped';
            startBtn.textContent = '🎧 Start Listening';
            startBtn.classList.remove('listening');
            if (analysisInterval) {
                clearInterval(analysisInterval);
                analysisInterval = null;
            }
            meterFill.style.width = '0%';
            amplitudeValue.textContent = '0';
            log('⏹️ Stopped listening');
        }
        // Detect clap with impulse validation
        function detectClap(amplitude) {
            const now = Date.now();
            // Check cooldown
            if (now - lastClapTime < CONFIG.COOLDOWN_MS) {
                return;
            }
            // PHASE 0: Waiting for silence after rejecting sustained sound
            if (waitingForSilence) {
                if (amplitude < CONFIG.BASELINE_THRESHOLD) {
                    waitingForSilence = false;
                    log(`⏸️ Silence detected, ready for next clap`);
                }
                return;
            }
            // PHASE 1: Waiting for spike
            if (!waitingForDecay) {
                if (amplitude >= CONFIG.AMPLITUDE_THRESHOLD) {
                    spikeStartTime = now;
                    spikeSampleCount = 1;
                    waitingForDecay = true;
                    log(`⚡ Spike detected: ${amplitude.toFixed(0)}`);
                }
            }
            // PHASE 2: Waiting for decay
            else {
                const spikeDuration = now - spikeStartTime;
                // Check if decayed to baseline
                if (amplitude < CONFIG.BASELINE_THRESHOLD) {
                    if (spikeDuration <= CONFIG.MAX_IMPULSE_DURATION_MS) {
                        confirmClap(now);
                    } else {
                        log(`❌ Rejected: decay too slow`);
                    }
                    resetSpike();
                }
                // Check if sustained too long
                else if (spikeDuration > CONFIG.MAX_IMPULSE_DURATION_MS) {
                    log(`❌ Rejected: sustained sound (${spikeDuration}ms)`);
                    resetSpike();
                    waitingForSilence = true;  // Wait for silence before detecting again
                }
                else {
                    spikeSampleCount++;
                }
            }
        }
        function resetSpike() {
            spikeStartTime = null;
            spikeSampleCount = 0;
            waitingForDecay = false;
        }
        function confirmClap(now) {
            lastClapTime = now;
            clapCount++;
            totalClaps++;
            log(`✓ Clap confirmed!`, 'clap');
            // Visual feedback
            clapCircle.classList.add('active');
            clapCountEl.textContent = totalClaps;
            setTimeout(() => clapCircle.classList.remove('active'), 200);
            // Clear existing timer
            if (clapTimer) {
                clearTimeout(clapTimer);
            }
            // Set timer to finalize clap count
            clapTimer = setTimeout(() => {
                sendCommand(clapCount);
                clapCount = 0;
            }, CONFIG.MULTI_CLAP_WINDOW_MS);
        }
        // Send command
        function sendCommand(count) {
            let command = '';
            switch (count) {
                case 1:
                    command = '▶️ PLAY/PAUSE';
                    break;
                case 2:
                    command = '⏩ SEEK FORWARD 10s';
                    break;
                default:
                    command = `🎯 ${count} CLAPS (no action defined)`;
            }
            log(`${command}`, 'command');
        }
        // Toggle listening
        startBtn.addEventListener('click', () => {
            if (!audioContext) {
                initAudio();
            } else if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        });
        // Initialize threshold line position
        updateConfig();
    </script>
</body>

</html>
